<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 블로그</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column; /* 모바일에서도 정렬이 어긋나지 않도록 변경 */
        }
        .sidebar {
            width: 200px;
            background-color: #f4f4f4;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            height: 100vh;
            position: fixed;
        }
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            color: #333;
            text-decoration: none;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .sidebar a:hover {
            background-color: #ddd;
        }
        .content {
            margin-left: 220px; /* 데스크톱 기준으로 여백 */
            padding: 20px;
            flex: 1;
        }
        .profile {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap; /* 모바일에서도 요소가 자동으로 줄바꿈 */
        }
        .profile img {
            border-radius: 0%;
            max-width: 100%; /* 모바일 화면에서 가로폭 제한 */
            height: auto; /* 높이를 자동으로 조정 */
            margin-bottom: 10px; /* 모바일에서 이미지 아래 여백 */
        }
        .profile h1 {
            margin: 0;
            margin-top: -10px; /* 텍스트 위로 올리기 */
        }
        .details p {
            margin: 5px 0;
        }

        /* 미디어 쿼리: 화면 너비가 768px 이하인 경우 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%; /* 사이드바를 화면 전체로 확장 */
                height: auto;
                position: relative;
                box-shadow: none;
            }
            .content {
                margin-left: 0; /* 모바일에서 여백 제거 */
            }
            .profile {
                flex-direction: column; /* 모바일에서는 세로 정렬 */
                align-items: center; /* 중앙 정렬 */
            }
            .profile img {
                margin-right: 0; /* 이미지 우측 여백 제거 */
            }
            .profile h1 {
                margin-top: 0; /* 추가적인 여백 제거 */
            }
        }
    </style>
</head>
<body>
    <!-- 왼쪽 사이드바 -->
    <div class="sidebar">
        <h2>카테고리</h2>
        <a href="undergraduate/index.html">Undergraduate</a>
        <a href="master-course/index.html">Master-course</a>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="content">
        <div class="profile">
            <img src="Me.jpg" alt="프로필 사진">
            <div>
                <h1>홍길동</h1>
                <p>Software Engineer | AI Researcher</p>
            </div>
        </div>
    </div>
</body>
</html>
